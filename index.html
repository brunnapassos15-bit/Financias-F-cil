<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinançasFácil</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>FinançasFácil</h1>
    <p>Seu dinheiro, sob controle.</p>
  </header>

  <!-- ABAS -->
  <div class="abas">
    <button class="aba ativa" onclick="mostrarAba('inicio')">Início</button>
    <button class="aba" onclick="mostrarAba('historico')">Histórico</button>
  </div>

  <main>

    <!-- ABA INÍCIO -->
    <div id="aba-inicio">

      <section id="resumo">
        <div class="card">
          <span>Saldo do mês</span>
          <strong id="saldo">R$ 0,00</strong>
        </div>
        <div class="card">
          <span>Total de entradas</span>
          <strong id="total-entradas" class="verde">R$ 0,00</strong>
        </div>
        <div class="card">
          <span>Total de saídas</span>
          <strong id="total-saidas" class="vermelho">R$ 0,00</strong>
        </div>
        <div class="card">
          <span>Meta guardada</span>
          <strong id="meta-guardada">R$ 0,00</strong>
        </div>
      </section>

      <section id="configuracao">
        <h2>Configuração do mês</h2>
        <label>Salário mensal (R$)
          <input type="text" id="salario" placeholder="Ex: 1.000,00">
        </label>
        <label>Meta de reserva mensal (R$)
          <input type="text" id="meta" placeholder="Ex: 200,00">
        </label>
        <button id="btn-salvar-config">Salvar configuração</button>
      </section>

      <section id="nova-transacao">
        <h2>Registrar transação</h2>
        <div class="form-grid">
          <label>Descrição
            <input type="text" id="descricao" placeholder="Ex: Almoço, Salário...">
          </label>
          <label>Valor (R$)
            <input type="text" id="valor" placeholder="Ex: 45,00">
          </label>
          <label>Tipo
            <select id="tipo">
              <option value="saida">Saída (gasto)</option>
              <option value="entrada">Entrada (recebimento)</option>
            </select>
          </label>
          <label>Categoria
            <select id="categoria">
              <option value="alimentacao">Alimentação</option>
              <option value="transporte">Transporte</option>
              <option value="lazer">Lazer</option>
              <option value="saude">Saúde</option>
              <option value="assinatura">Assinatura</option>
              <option value="salario">Salário</option>
              <option value="outros">Outros</option>
            </select>
          </label>
        </div>
        <button id="btn-adicionar">+ Adicionar transação</button>
      </section>

      <section id="historico-mes">
        <h2>Transações do mês</h2>
        <ul id="lista-transacoes">
          <li>Nenhuma transação ainda.</li>
        </ul>
      </section>

    </div>

    <!-- ABA HISTÓRICO -->
    <div id="aba-historico" class="escondido">
      <section>
        <h2>Histórico por mês</h2>
        <div id="lista-historico">
          <p class="vazio">Nenhum mês fechado ainda.</p>
        </div>
      </section>
    </div>

  </main>

  <script src="app.js"></script>
</body>

</html>
